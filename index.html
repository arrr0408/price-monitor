<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="价格监控">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<title>实时价格监控</title>
<style>
  :root {
    --bg: #f2f3f7;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #8e8e9a;
    --up-color: #e53935;
    --down-color: #1db88f;
    --border: #e8e8ef;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --accent: #5b6af0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(180deg, #f0f1f6 0%, #f5f6fa 100%);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .header {
    padding: 18px 20px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--text);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 2s infinite;
  }

  .status-dot.error { background: #e53935; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .refresh-countdown {
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 50px;
    text-align: right;
  }

  .cards {
    padding: 4px 16px 100px;
    padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card:active {
    transform: scale(0.987);
  }

  .card.swiping { transition: none; }

  .card.longpress {
    background: #fff5f5;
    box-shadow: 0 0 0 2px rgba(229,57,53,0.25);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .card.deleting {
    overflow: hidden;
    max-height: 300px;
    margin-bottom: 0;
    padding-top: 0;
    padding-bottom: 0;
    opacity: 0;
    transition: max-height 0.3s ease, margin 0.3s ease, padding 0.3s ease, opacity 0.25s;
  }

  .card-swipe-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #fef0ef;
    display: flex; align-items: center;
    justify-content: flex-end;
    padding-right: 28px;
    font-size: 14px; font-weight: 600;
    color: var(--up-color);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s;
    border-radius: 16px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .card-note {
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 10px;
  }

  .card-body {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .price-main {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1.5px;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
    line-height: 1.1;
  }

  .price-change {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }

  .change-value {
    font-size: 16px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    padding: 2px 8px;
    border-radius: 6px;
  }

  .change-pct {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .up { color: var(--up-color); }
  .up.change-value { background: #fef0ef; }
  .down { color: var(--down-color); }
  .down.change-value { background: #edfaf6; }
  .flat { color: var(--text-secondary); }

  .card-detail {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .detail-item { display: flex; gap: 4px; }
  .detail-label { opacity: 0.65; }
  .detail-value {
    font-variant-numeric: tabular-nums;
    color: var(--text);
    font-weight: 500;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .flash {
    animation: flash-bg 0.7s ease-out;
  }

  @keyframes flash-bg {
    0% { background: #fff7e6; }
    100% { background: var(--card-bg); }
  }

  .offline-banner {
    display: none;
    text-align: center;
    padding: 12px;
    margin: 0 14px;
    background: #fef0ef;
    border-radius: 10px;
    color: var(--up-color);
    font-size: 13px;
    font-weight: 500;
  }

  .offline-banner.show { display: block; }

  /* 底部工具栏 — 沉浸光感 */
  .bottom-bar {
    position: fixed;
    bottom: 24px;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    padding: 6px 16px;
    background: rgba(255, 255, 255, 0.64);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border-radius: 26px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 4px 24px rgba(0,0,0,0.06),
      0 1px 3px rgba(0,0,0,0.04);
    z-index: 100;
  }

  .bar-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: transparent;
    font-size: 22px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }
  .bar-btn:hover, .bar-btn.active {
    background: var(--accent);
    color: #fff;
  }
  .bar-btn.active { transform: rotate(45deg); }

  /* 添加面板 */
  .add-panel {
    display: none;
    position: fixed;
    bottom: 90px;
    left: 14px;
    right: 14px;
    z-index: 99;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.1);
  }
  .add-panel.show { display: block; }
  .add-panel-row {
    display: flex; gap: 8px; align-items: center;
  }
  .add-panel input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .add-panel input:focus { border-color: var(--accent); }
  .add-panel .code-input { max-width: 140px; }
  .add-panel .submit-btn {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .add-panel .hint {
    font-size: 11px; color: var(--text-secondary); margin-top: 8px;
  }
  .add-panel .hint code {
    background: var(--bg); padding: 1px 6px; border-radius: 4px; font-size: 11px;
  }

  /* 删除按钮 */
  .delete-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    background: #f5f5f5;
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
    margin-left: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .delete-btn:active { background: #fdd; color: var(--up-color); }

  /* 持仓信息 */
  .card-position {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  .pos-row {
    display: flex; align-items: center;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .pos-row:last-child { margin-bottom: 0; }
  .pos-label { color: var(--text-secondary); margin-right: 4px; }
  .pos-value { font-weight: 600; color: var(--text); }

  .edit-hold-btn {
    margin-left: auto;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: none;
    background: transparent;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .edit-hold-btn:active { background: var(--accent); color: #fff; }

  .cards { padding-bottom: 90px; }

  /* K线模态层 */
  .kline-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .kline-overlay.show { opacity: 1; pointer-events: auto; }

  .kline-sheet {
    width: 100%;
    height: 80vh;
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s ease-out;
  }
  .kline-overlay.show .kline-sheet { transform: translateY(0); }

  .kline-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
    flex-shrink: 0;
  }
  .kline-title { font-size: 16px; font-weight: 700; }
  .kline-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    font-size: 18px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .kline-chart {
    flex: 1;
    min-height: 0;
  }
  .kline-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-secondary);
    font-size: 14px;
  }

  @media (min-width: 768px) {
    .cards { max-width: 520px; margin-left: auto; margin-right: auto; }
    .add-panel { left: 50%; right: auto; transform: translateX(-50%); width: 100%; max-width: 520px; }
    .kline-sheet {
      width: 520px;
      margin: 0 auto;
      border-radius: 20px;
      height: 75vh;
    }
    .kline-overlay { align-items: center; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>实时价格</h1>
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span class="refresh-countdown" id="countdown">5s</span>
  </div>
</div>

<div class="add-panel" id="addPanel">
  <div class="add-panel-row">
    <input class="code-input" id="codeInput" placeholder="代码 (如 sh600036)" autocomplete="off">
    <input id="nameInput" placeholder="名称 (可选)">
    <button class="submit-btn" id="submitBtn">添加</button>
  </div>
  <div class="add-panel-row" style="margin-top:8px;">
    <input id="sharesInput" placeholder="持股数 (可选)" type="number" step="1" inputmode="numeric">
    <input id="costInput" placeholder="成本价 (可选)" type="number" step="0.01" inputmode="decimal">
  </div>
  <div class="hint">填写持股数和成本价可显示持仓盈亏 · 重复代码将更新</div>
</div>

<div class="offline-banner" id="offlineBanner">网络连接异常，正在重试...</div>

<div class="cards" id="cards"></div>

<div class="bottom-bar">
  <button class="bar-btn" id="addBtn" title="添加自选">+</button>
</div>

<div class="kline-overlay" id="klineOverlay">
  <div class="kline-sheet">
    <div class="kline-header">
      <span class="kline-title" id="klineTitle">K线图</span>
      <button class="kline-close" id="klineClose">&times;</button>
    </div>
    <div class="kline-chart" id="klineChart"><div class="kline-loading">加载中...</div></div>
  </div>
</div>

<script>
const REFRESH_INTERVAL = 5000; // ms
let countdown = REFRESH_INTERVAL / 1000;
let lastPrices = {};
let fetchTimer = null;
let countdownTimer = null;
let consecutiveErrors = 0;
const MAX_ERRORS = 3;

function getChangeClass(v) {
  if (v > 0) return 'up';
  if (v < 0) return 'down';
  return 'flat';
}

function formatNum(n, decimals) {
  if (n == null || isNaN(n)) return '--';
  decimals = decimals != null ? decimals : (Math.abs(n) >= 10 ? 2 : 4);
  return n.toFixed(decimals);
}

function formatChange(v) {
  if (v == null || isNaN(v)) return '--';
  return (v >= 0 ? '+' : '') + v.toFixed(4);
}

function formatPct(v) {
  if (v == null || isNaN(v)) return '--';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

const STORAGE_KEY = 'price_monitor_customs';
const HIDDEN_KEY = 'price_monitor_hidden';

// ── 本地缓存（离线兜底）──
function getLocal(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || fallback); } catch (e) { return JSON.parse(fallback); }
}
function setLocal(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}

// ── 服务端状态 ──
let _serverState = null;

async function loadServerState() {
  try {
    const resp = await fetch('/api/state');
    if (resp.ok) { _serverState = await resp.json(); }
  } catch (e) {}
  if (!_serverState) {
    _serverState = { hidden: getLocal(HIDDEN_KEY, '[]'), customs: getLocal(STORAGE_KEY, '[]') };
  }
}

async function saveServerState() {
  // 同时写本地缓存
  setLocal(HIDDEN_KEY, _serverState.hidden);
  setLocal(STORAGE_KEY, _serverState.customs);
  // 推送到服务端
  try {
    await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_serverState),
    });
  } catch (e) {}
}

function getCustomItems() {
  return (_serverState && _serverState.customs) || getLocal(STORAGE_KEY, '[]');
}

async function saveCustomItems(items) {
  if (_serverState) _serverState.customs = items;
  setLocal(STORAGE_KEY, items);
  await saveServerState();
}

function getHiddenItems() {
  return (_serverState && _serverState.hidden) || getLocal(HIDDEN_KEY, '[]');
}

async function saveHiddenItems(items) {
  if (_serverState) _serverState.hidden = items;
  setLocal(HIDDEN_KEY, items);
  await saveServerState();
}

function isCustom(code) {
  return getCustomItems().some(c => c.code === code);
}

function editHoldings(code) {
  const items = getCustomItems();
  const item = items.find(c => c.code === code);
  if (!item) return;

  document.getElementById('codeInput').value = item.code;
  document.getElementById('nameInput').value = item.name !== item.code ? item.name : '';
  document.getElementById('sharesInput').value = item.shares || '';
  document.getElementById('costInput').value = item.cost || '';
  document.getElementById('submitBtn').textContent = '更新';

  const panel = document.getElementById('addPanel');
  const btn = document.getElementById('addBtn');
  panel.classList.add('show');
  btn.classList.add('active');

  setTimeout(() => document.getElementById('sharesInput').focus(), 100);
}

async function removeItem(code) {
  // 自定义项：从列表删除
  const customs = getCustomItems().filter(c => c.code !== code);
  await saveCustomItems(customs);
  // 默认项：加入隐藏列表
  const configCodes = ['hf_XAU', 'fx_susdcny', 'gjs_Au9999', 'computed_jicun'];
  if (configCodes.includes(code)) {
    const hidden = getHiddenItems();
    if (!hidden.includes(code)) {
      hidden.push(code);
      await saveHiddenItems(hidden);
    }
  }
  fetchPrices();
}

function renderCard(item) {
  const changeCls = getChangeClass(item.change);
  const oldPrice = lastPrices[item.code];
  const priceChanged = oldPrice != null && oldPrice !== item.price;
  const flashCls = priceChanged ? ' flash' : '';
  const customCls = isCustom(item.code) ? ' custom' : '';
  const isClosed = item.price === 0 && item.code === 'gjs_Au9999';

  const unit = item.code === 'fx_susdcny' ? '' :
               item.code === 'hf_XAU' ? ' $/oz' : ' 元/克';

  const delBtn = `<button class="delete-btn" onclick="event.stopPropagation();removeItem('${item.code}')">&times;</button>`;
  const swipeBg = '<div class="card-swipe-bg">释放删除</div>';

  // 持仓信息
  const shares = item.shares || 0;
  const cost = item.cost || 0;
  const editBtn = `<button class="edit-hold-btn" onclick="event.stopPropagation();editHoldings('${item.code}')" title="编辑持仓">✎</button>`;
  let positionHtml = '';
  if (shares > 0 && cost > 0 && item.price > 0) {
    const marketValue = shares * item.price;
    const profit = marketValue - shares * cost;
    const profitPct = (item.price - cost) / cost * 100;
    const profitCls = profit >= 0 ? 'up' : 'down';
    positionHtml = `
    <div class="card-position">
      <div class="pos-row">
        <span class="pos-label">持仓</span><span class="pos-value">${shares}股</span>
        <span class="pos-label" style="margin-left:12px;">市值</span><span class="pos-value">¥${marketValue.toFixed(0)}</span>
      </div>
      <div class="pos-row">
        <span class="pos-label">成本</span><span class="pos-value">¥${cost.toFixed(2)}</span>
        <span class="pos-label" style="margin-left:12px;">盈亏</span>
        <span class="pos-value ${profitCls}">${profit >= 0 ? '+' : ''}¥${profit.toFixed(0)} (${profitPct >= 0 ? '+' : ''}${profitPct.toFixed(2)}%)</span>
        ${editBtn}
      </div>
    </div>`;
  } else if (shares > 0 && item.price > 0) {
    const marketValue = shares * item.price;
    positionHtml = `
    <div class="card-position">
      <div class="pos-row">
        <span class="pos-label">持仓</span><span class="pos-value">${shares}股</span>
        <span class="pos-label" style="margin-left:12px;">市值</span><span class="pos-value">¥${marketValue.toFixed(0)}</span>
        ${editBtn}
      </div>
    </div>`;
  }

  if (isClosed) {
    return `
    <div class="card${customCls}" data-code="${item.code}" style="opacity:0.5">
      ${swipeBg}
      <div class="card-header">
        <span class="card-name">${item.name}${delBtn}</span>
        <span class="card-note">${item.note || item.code}</span>
      </div>
      <div class="card-body">
        <span class="price-main flat">休市中</span>
        <div class="price-change">
          <span class="change-value flat">--</span>
          <span class="change-pct flat">--</span>
        </div>
      </div>
      ${positionHtml}
      <div class="card-footer">
        <span>交易时间 周一至周五</span>
        <span>${item.time}</span>
      </div>
    </div>`;
  }

  const emptyDetail = item.high === 0 && item.low === 0 && item.open === 0;
  const detailHtml = emptyDetail ? '' : `
    <div class="card-detail">
      <div class="detail-item"><span class="detail-label">最高</span><span class="detail-value">${formatNum(item.high)}</span></div>
      <div class="detail-item"><span class="detail-label">最低</span><span class="detail-value">${formatNum(item.low)}</span></div>
      <div class="detail-item"><span class="detail-label">开盘</span><span class="detail-value">${formatNum(item.open)}</span></div>
      <div class="detail-item"><span class="detail-label">昨收</span><span class="detail-value">${formatNum(item.prev_close)}</span></div>
    </div>`;

  return `
    <div class="card${flashCls}${customCls}" data-code="${item.code}">
      ${swipeBg}
      <div class="card-header">
        <span class="card-name">${item.name}${delBtn}</span>
        <span class="card-note">${item.note || item.code}</span>
      </div>
      <div class="card-body">
        <span class="price-main ${changeCls}">${item.price > 0 ? formatNum(item.price) : '--'}<span style="font-size:14px;font-weight:400;opacity:0.6">${unit}</span></span>
        <div class="price-change">
          <span class="change-value ${changeCls}">${item.price > 0 ? formatChange(item.change) : '--'}</span>
          <span class="change-pct ${changeCls}">${item.price > 0 ? formatPct(item.change_pct) : '--'}</span>
        </div>
      </div>
      ${detailHtml}
      ${positionHtml}
      <div class="card-footer">
        <span>${item.code}</span>
        <span>${item.time ? '更新 ' + item.time : ''}</span>
      </div>
    </div>`;
}

async function fetchPrices() {
  try {
    // 静默同步服务端状态（跨设备）
    try {
      const r = await fetch('/api/state');
      if (r.ok) { const s = await r.json(); _serverState = s; }
    } catch (e) {}

    const customs = getCustomItems();
    const codesParam = customs.length > 0 ? '?codes=' + customs.map(c => c.code).join(',') : '';
    const resp = await fetch('/api/prices' + codesParam);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    consecutiveErrors = 0;
    document.getElementById('offlineBanner').classList.remove('show');
    document.getElementById('statusDot').classList.remove('error');

    // 过滤隐藏项
    const hidden = getHiddenItems();
    data.items = data.items.filter(it => !hidden.includes(it.code));

    // 记录旧价格用于 flash 动画
    const newPrices = {};
    data.items.forEach(it => { newPrices[it.code] = it.price; });

    // 用户自定义数据覆盖 API 数据
    const customMap = {};
    customs.forEach(c => { customMap[c.code] = c; });
    data.items.forEach(it => {
      const c = customMap[it.code];
      if (c) {
        if (c.name !== it.code) it.name = c.name;
        it.shares = c.shares || 0;
        it.cost = c.cost || 0;
      }
    });

    const cardsHtml = data.items.map(renderCard).join('');
    document.getElementById('cards').innerHTML = cardsHtml;

    // 更新后保存价格
    lastPrices = newPrices;

    // 重置倒计时
    countdown = REFRESH_INTERVAL / 1000;
    updateCountdown();

  } catch (err) {
    console.error('拉取失败:', err);
    consecutiveErrors++;
    if (consecutiveErrors >= MAX_ERRORS) {
      document.getElementById('offlineBanner').classList.add('show');
      document.getElementById('statusDot').classList.add('error');
    }
  }
}

function updateCountdown() {
  document.getElementById('countdown').textContent = countdown + 's';
}

// 倒计时定时器
countdownTimer = setInterval(() => {
  countdown = Math.max(0, countdown - 1);
  updateCountdown();
}, 1000);

// 数据拉取定时器
fetchTimer = setInterval(fetchPrices, REFRESH_INTERVAL);

// 先同步服务端状态，再拉取数据
loadServerState().then(() => {
  fetchPrices();
});

// 页面可见性变化时立即刷新
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    fetchPrices();
    countdown = REFRESH_INTERVAL / 1000;
    updateCountdown();
  }
});

// + 按钮：切换添加面板
document.getElementById('addBtn').addEventListener('click', () => {
  const panel = document.getElementById('addPanel');
  const btn = document.getElementById('addBtn');
  const closing = panel.classList.contains('show');
  panel.classList.toggle('show');
  btn.classList.toggle('active');
  if (closing) {
    // 关闭面板时清空并重置
    document.getElementById('codeInput').value = '';
    document.getElementById('nameInput').value = '';
    document.getElementById('sharesInput').value = '';
    document.getElementById('costInput').value = '';
    document.getElementById('submitBtn').textContent = '添加';
  }
});

// 提交按钮：添加/更新自选
document.getElementById('submitBtn').addEventListener('click', async () => {
  const codeInput = document.getElementById('codeInput');
  const nameInput = document.getElementById('nameInput');
  const sharesInput = document.getElementById('sharesInput');
  const costInput = document.getElementById('costInput');

  const code = codeInput.value.trim();
  if (!code) return;

  const name = nameInput.value.trim() || code;
  const shares = parseInt(sharesInput.value) || 0;
  const cost = parseFloat(costInput.value) || 0;
  const items = getCustomItems();
  const existIdx = items.findIndex(c => c.code === code);

  // 如果是之前隐藏的配置项，取消隐藏
  const hidden = getHiddenItems();
  if (hidden.includes(code)) {
    saveHiddenItems(hidden.filter(h => h !== code)).then(() => fetchPrices());
    codeInput.value = ''; nameInput.value = ''; sharesInput.value = ''; costInput.value = '';
    document.getElementById('submitBtn').textContent = '添加';
    document.getElementById('addPanel').classList.remove('show');
    document.getElementById('addBtn').classList.remove('active');
    return;
  }

  const entry = { name, code, shares: shares > 0 ? shares : 0, cost: cost > 0 ? cost : 0 };

  if (existIdx >= 0) {
    // 保留原有持股数据（如果新输入为空）
    const old = items[existIdx];
    if (!entry.shares) entry.shares = old.shares || 0;
    if (!entry.cost) entry.cost = old.cost || 0;
    if (entry.name === code) entry.name = old.name;  // 保留旧名称
    items[existIdx] = entry;
  } else {
    items.push(entry);
  }
  await saveCustomItems(items);

  // 清空输入
  codeInput.value = '';
  nameInput.value = '';
  sharesInput.value = '';
  costInput.value = '';
  document.getElementById('submitBtn').textContent = '添加';

  // 收起面板并刷新
  document.getElementById('addPanel').classList.remove('show');
  document.getElementById('addBtn').classList.remove('active');
  fetchPrices();
});

// 回车键提交
['codeInput', 'nameInput', 'sharesInput', 'costInput'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('submitBtn').click();
  });
});

// ═══════════════════════════════════════
// 长按删除 + 右滑删除
// ═══════════════════════════════════════

const LONG_PRESS_MS = 600;
let touchCard = null;
let touchStartX = 0;
let touchStartY = 0;
let touchOffset = 0;
let touchSwiping = false;
let longPressTimer = null;
let longPressFired = false;

const cardsContainer = document.getElementById('cards');

cardsContainer.addEventListener('touchstart', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  touchCard = card;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchOffset = 0;
  touchSwiping = false;
  longPressFired = false;

  // 启动长按计时器
  longPressTimer = setTimeout(() => {
    longPressFired = true;
    // 震动反馈
    if (navigator.vibrate) navigator.vibrate(15);
    // 视觉反馈：红色高亮
    touchCard.classList.add('longpress');
    const bg = touchCard.querySelector('.card-swipe-bg');
    if (bg) {
      bg.textContent = '松手删除';
      bg.style.opacity = '1';
      bg.style.background = '#fdd';
    }
  }, LONG_PRESS_MS);
}, { passive: true });

cardsContainer.addEventListener('touchmove', (e) => {
  if (!touchCard) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  // 移动超过阈值：取消长按，转为滑动模式
  if (!touchSwiping && !longPressFired && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
    clearTimeout(longPressTimer);
    if (Math.abs(dx) > Math.abs(dy) * 1.2) {
      touchSwiping = true;
      touchCard.classList.add('swiping');
    } else {
      // 竖直滑动：取消整个操作
      touchCard = null;
      return;
    }
  }

  if (touchSwiping && !longPressFired) {
    touchOffset = Math.max(0, Math.min(dx, 140));
    touchCard.style.transform = `translateX(${touchOffset}px)`;
    touchCard.style.opacity = 1 - touchOffset / 300;
    const bg = touchCard.querySelector('.card-swipe-bg');
    if (bg) {
      bg.textContent = '释放删除';
      bg.style.opacity = Math.min(1, touchOffset / 60);
      bg.style.background = '#fef0ef';
    }
  }
}, { passive: true });

cardsContainer.addEventListener('touchend', () => {
  clearTimeout(longPressTimer);

  if (!touchCard) return;

  const code = touchCard.dataset.code;

  if (longPressFired || (touchSwiping && touchOffset > 80)) {
    // 删除：卡片收起，下方自然上移
    touchCard.classList.remove('swiping', 'longpress');
    const h = touchCard.offsetHeight;
    touchCard.style.maxHeight = h + 'px';
    touchCard.style.marginBottom = getComputedStyle(touchCard).marginBottom;
    // 强制重排后触发动画
    touchCard.offsetHeight;
    touchCard.classList.add('deleting');
    touchCard.addEventListener('transitionend', function handler() {
      touchCard.removeEventListener('transitionend', handler);
      touchCard.style.display = 'none';
      if (code) removeItem(code);
    });
  } else {
    // 回弹
    touchCard.classList.remove('swiping', 'longpress');
    touchCard.style.transform = '';
    touchCard.style.opacity = '';
    touchCard.style.transition = 'transform 0.25s ease, opacity 0.2s';
    const bg = touchCard.querySelector('.card-swipe-bg');
    if (bg) { bg.textContent = '释放删除'; bg.style.opacity = ''; bg.style.background = ''; }
  }

  touchCard = null;
  touchOffset = 0;
  touchSwiping = false;
  longPressFired = false;
});

// 阻止滑动/长按后的 click 事件触发 K 线
cardsContainer.addEventListener('click', (e) => {
  if (touchSwiping || longPressFired) {
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();
  }
}, true);

// ═══════════════════════════════════════
// K线图
// ═══════════════════════════════════════

const KLINE_INTERVAL = 5000; // K线刷新间隔 ms
let klineChart = null;
let klineTimer = null;
let currentKlineCode = '';
const overlay = document.getElementById('klineOverlay');
const klineChartDom = document.getElementById('klineChart');

function closeKline() {
  overlay.classList.remove('show');
  if (klineTimer) { clearInterval(klineTimer); klineTimer = null; }
  currentKlineCode = '';
  if (klineChart) {
    klineChart.dispose();
    klineChart = null;
  }
}

document.getElementById('klineClose').addEventListener('click', closeKline);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeKline();
});

// 卡片点击 → 打开K线（事件委托）
document.getElementById('cards').addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const code = card.dataset.code;
  if (!code) return;
  const nameEl = card.querySelector('.card-name');
  const name = nameEl ? nameEl.textContent.replace('×', '').trim() : code;
  openKline(code, name);
});

async function openKline(code, name) {
  // 关闭之前的
  closeKline();

  currentKlineCode = code;
  document.getElementById('klineTitle').textContent = name + ' K线';
  klineChartDom.innerHTML = '<div class="kline-loading">加载中...</div>';
  overlay.classList.add('show');

  await fetchAndRenderKline(code);

  // 定时刷新 K 线
  klineTimer = setInterval(() => fetchAndRenderKline(code), KLINE_INTERVAL);
}

async function fetchAndRenderKline(code) {
  try {
    const resp = await fetch(`/api/kline?code=${code}&days=120&_=${Date.now()}`);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const items = data.items || [];

    if (items.length === 0) {
      if (!klineChart) klineChartDom.innerHTML = '<div class="kline-loading">暂无K线数据</div>';
      return;
    }

    const dates = [];
    const ohlc = [];
    const ma5 = [];
    const ma10 = [];
    const ma20 = [];
    const volumes = [];

    items.forEach(d => {
      dates.push(d.day);
      ohlc.push([parseFloat(d.open), parseFloat(d.close), parseFloat(d.low), parseFloat(d.high)]);
      ma5.push(d.ma_price5 != null ? parseFloat(d.ma_price5) : null);
      ma10.push(d.ma_price10 != null ? parseFloat(d.ma_price10) : null);
      ma20.push(d.ma_price20 != null ? parseFloat(d.ma_price20) : null);
      volumes.push([ohlc.length - 1, parseFloat(d.volume) || 0, ohlc[ohlc.length - 1][1] >= ohlc[ohlc.length - 1][0] ? 1 : -1]);
    });

    if (!klineChart) {
      // 首次渲染：创建图表
      klineChartDom.innerHTML = '';
      klineChart = echarts.init(klineChartDom, null, { renderer: 'canvas' });

      const option = {
        animation: false,
        grid: [
          { left: 10, right: 10, top: 10, height: '65%' },
          { left: 10, right: 10, top: '78%', height: '14%' },
        ],
        xAxis: [
          {
            type: 'category', data: dates, gridIndex: 0,
            axisLine: { lineStyle: { color: '#e8e8ef' } },
            axisLabel: { color: '#8e8e9a', fontSize: 10 },
            axisTick: { show: false },
          },
          {
            type: 'category', data: dates, gridIndex: 1,
            axisLine: { show: false },
            axisLabel: { show: false },
            axisTick: { show: false },
          },
        ],
        yAxis: [
          {
            type: 'value', gridIndex: 0, scale: true,
            splitLine: { lineStyle: { color: '#f2f3f7' } },
            axisLabel: { color: '#8e8e9a', fontSize: 10 },
          },
          {
            type: 'value', gridIndex: 1,
            axisLabel: { show: false }, splitLine: { show: false },
          },
        ],
        dataZoom: [
          {
            type: 'slider', xAxisIndex: 0, height: 20, bottom: 6,
            borderColor: '#e8e8ef', backgroundColor: '#f2f3f7',
            dataBackground: {
              lineStyle: { color: '#d0d0d8' },
              areaStyle: { color: 'rgba(91,106,240,0.06)' },
            },
            selectedDataBackground: {
              lineStyle: { color: '#5b6af0' },
              areaStyle: { color: 'rgba(91,106,240,0.12)' },
            },
            handleStyle: { color: '#5b6af0' },
            moveHandleStyle: { color: '#5b6af0' },
          },
          { type: 'inside', xAxisIndex: 0 },
        ],
        tooltip: {
          trigger: 'axis', axisPointer: { type: 'cross' },
          backgroundColor: '#fff', borderColor: '#e8e8ef',
          textStyle: { color: '#1a1a2e', fontSize: 12 },
        },
        series: [
          {
            name: 'K线', type: 'candlestick', xAxisIndex: 0, yAxisIndex: 0,
            data: ohlc,
            itemStyle: { color: '#e53935', color0: '#1db88f', borderColor: '#e53935', borderColor0: '#1db88f' },
          },
          {
            name: 'MA5', type: 'line', xAxisIndex: 0, yAxisIndex: 0,
            data: ma5, smooth: true, symbol: 'none',
            lineStyle: { color: '#f5a623', width: 1 },
          },
          {
            name: 'MA10', type: 'line', xAxisIndex: 0, yAxisIndex: 0,
            data: ma10, smooth: true, symbol: 'none',
            lineStyle: { color: '#4a90d9', width: 1 },
          },
          {
            name: 'MA20', type: 'line', xAxisIndex: 0, yAxisIndex: 0,
            data: ma20, smooth: true, symbol: 'none',
            lineStyle: { color: '#7b68ee', width: 1 },
          },
          {
            name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 1,
            data: volumes,
            itemStyle: {
              color: function (p) { return p.data[2] >= 0 ? '#f9ccd3' : '#c5ede0'; },
            },
          },
        ],
      };

      klineChart.setOption(option);
      window.addEventListener('resize', () => klineChart && klineChart.resize());
    } else {
      // 增量更新：只更新数据，保持缩放状态
      klineChart.setOption({
        xAxis: [{ data: dates }, { data: dates }],
        series: [
          { data: ohlc },
          { data: ma5 },
          { data: ma10 },
          { data: ma20 },
          { data: volumes },
        ],
      });
    }
  } catch (err) {
    if (!klineChart) klineChartDom.innerHTML = '<div class="kline-loading">加载失败: ' + err.message + '</div>';
  }
}

// 页面卸载时清理
window.addEventListener('beforeunload', () => {
  if (klineTimer) clearInterval(klineTimer);
  if (klineChart) klineChart.dispose();
});
</script>
